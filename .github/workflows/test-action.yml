name: test-action

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Run action (start)
        uses: ./
        id: otel

      - name: Verify environment variables
        run: |
          if [ -z "$TRACEPARENT" ]; then
            echo "TRACEPARENT is not set"
            exit 1
          fi
          if [ -z "$TRACEPARENT_START" ]; then
            echo "TRACEPARENT_START is not set"
            exit 1
          fi
          echo "TRACEPARENT=$TRACEPARENT"
          echo "TRACEPARENT_START=$TRACEPARENT_START"

      - name: Mock some work
        run: sleep 1
